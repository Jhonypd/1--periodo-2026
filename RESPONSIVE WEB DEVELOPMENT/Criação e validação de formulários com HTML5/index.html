<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Lançamento de Notas - Faculdade</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #001f2d;
        padding: 40px;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 4px;
        max-width: 900px;
        margin: auto;
      }
      h1 {
        font-size: 22px;
        color: #000;
        margin-bottom: 25px;
      }
      .header-select {
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }
      th {
        text-align: left;
        padding: 10px;
        font-weight: bold;
      }
      td {
        padding: 8px 10px;
      }
      input[type="number"],
      select {
        padding: 6px;
        border: 2px solid #000;
        border-radius: 4px;
        width: 70px;
        font-size: 14px;
      }
      select {
        width: auto;
        font-weight: bold;
      }
      .readonly-field {
        background-color: #fff;
        border: 2px solid #ccc;
        color: #555;
      }
      .btn-salvar {
        background-color: #001f2d;
        color: white;
        padding: 10px 25px;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      .btn-limpar {
        background-color: #1a2e35;
        color: white;
        padding: 10px 25px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        margin-left: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>LANÇAMENTO DE NOTAS</h1>

      <form id="notaForm">
        <div class="header-select">
          <label><strong>Selecione a disciplina</strong></label>
          <select name="disciplina">
            <option value="1">Introdução à informática</option>
            <option value="2">Linguagens de Programação</option>
            <option value="3" selected>Programação de Computadores</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th>Nome do aluno</th>
              <th>Prova 1</th>
              <th>Prova 2</th>
              <th>Exame</th>
              <th>Média</th>
              <th>Faltas</th>
            </tr>
          </thead>
          <tbody>
            <tr class="aluno-row">
              <td>Joana da Silva</td>
              <td>
                <input
                  type="number"
                  class="p1"
                  min="0"
                  max="10"
                  step="0.1"
                  value="8.0"
                  required
                />
              </td>
              <td>
                <input
                  type="number"
                  class="p2"
                  min="0"
                  max="10"
                  step="0.1"
                  value="7.0"
                  required
                />
              </td>
              <td>
                <input type="number" class="ex" min="0" max="10" step="0.1" />
              </td>
              <td>
                <input type="number" class="media readonly-field" readonly="" />
              </td>
              <td>
                <input type="number" min="0" max="16" value="1" required />
              </td>
            </tr>
            <tr class="aluno-row">
              <td>Maria do Socorro</td>
              <td>
                <input
                  type="number"
                  class="p1"
                  min="0"
                  max="10"
                  step="0.1"
                  value="9.4"
                  required
                />
              </td>
              <td>
                <input
                  type="number"
                  class="p2"
                  min="0"
                  max="10"
                  step="0.1"
                  value="9.0"
                  required
                />
              </td>
              <td>
                <input type="number" class="ex" min="0" max="10" step="0.1" />
              </td>
              <td>
                <input type="number" class="media readonly-field" readonly="" />
              </td>
              <td>
                <input type="number" min="0" max="16" value="0" required />
              </td>
            </tr>
            <!-- Pedro Santos -->
            <tr class="aluno-row">
              <td>Pedro Santos</td>
              <td>
                <input
                  type="number"
                  class="p1"
                  min="0"
                  max="10"
                  step="0.1"
                  value="6.0"
                  required
                />
              </td>
              <td>
                <input
                  type="number"
                  class="p2"
                  min="0"
                  max="10"
                  step="0.1"
                  value="5.0"
                  required
                />
              </td>
              <td>
                <input
                  type="number"
                  class="ex"
                  min="0"
                  max="10"
                  step="0.1"
                  value="7.5"
                />
              </td>
              <td>
                <input type="number" class="media readonly-field" readonly="" />
              </td>
              <td>
                <input type="number" min="0" max="16" value="0" required />
              </td>
            </tr>
          </tbody>
        </table>

        <button type="submit" class="btn-salvar">Salvar</button>
        <button type="reset" class="btn-limpar">Limpar</button>
      </form>
    </div>

    <script>
      const form = document.getElementById("notaForm");

      function calcularMedias() {
        const rows = document.querySelectorAll(".aluno-row");

        rows.forEach((row) => {
          const p1 = parseFloat(row.querySelector(".p1").value) || 0;
          const p2 = parseFloat(row.querySelector(".p2").value) || 0;
          const exame = parseFloat(row.querySelector(".ex").value) || null;
          const mediaField = row.querySelector(".media");

          let mediaFinal;

          if (exame !== null && row.querySelector(".ex").value !== "") {
            mediaFinal = (p1 + p2 + exame) / 3;
          } else {
            mediaFinal = (p1 + p2) / 2;
          }

          mediaField.value = mediaFinal.toFixed(1);
        });
      }

      form.addEventListener("input", calcularMedias);

      window.onload = calcularMedias;
    </script>
  </body>
</html>
